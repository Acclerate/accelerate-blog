name: Sync Yuque Posts

# 触发条件：
#   1. 每日 UTC 00:00（北京时间 08:00）自动同步一次
#   2. 在 Actions 页面可手动点 Run workflow
on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:      # 支持手动触发

# 同一份代码同时只能跑一个，避免冲突
concurrency:
  group: sync-yuque
  cancel-in-progress: false

permissions:
  contents: write         # 允许 workflow 提交回 main 分支

jobs:
  sync:
    name: Pull posts from Yuque via Elog
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          # 不需要拉 submodule，Elog 只动 content/posts/yuque/
          submodules: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Clean Elog cache
        run: npm run clean:elog
        continue-on-error: true   # 首次运行可能没有缓存，忽略错误

      - name: 📥 Sync posts from Yuque
        env:
          YUQUE_TOKEN: ${{ secrets.YUQUE_TOKEN }}
          YUQUE_LOGIN: ${{ secrets.YUQUE_LOGIN }}
          YUQUE_REPO:  ${{ secrets.YUQUE_REPO }}
        run: npm run sync

      - name: 🔍 Check for changes
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes from Yuque."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: 🚀 Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          COMMIT_DATE=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')
          git commit -m "chore(yuque): auto sync from Yuque @ ${COMMIT_DATE}"
          git push origin HEAD:main
